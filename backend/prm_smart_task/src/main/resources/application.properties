spring.application.name=prm_smart_task
server.port=${PORT:8080}

# JWT Configuration - Override via environment variables
security.jwt.secret=${JWT_SECRET:default-secret-key-min-32-chars-for-dev}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# PostgreSQL Database Configuration - Override via environment variables
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/prm_smart_task?sslmode=disable}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration - Override via environment variables
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cloudinary Configuration - Override via environment variables
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your-api-secret}

# File upload size limit (max 10MB for all uploads)
# Note: Avatar uploads have strict limit of 5MB enforced on service layer
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
